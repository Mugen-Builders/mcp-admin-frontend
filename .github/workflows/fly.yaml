name: Deploy Release to Fly.io

on:
  release:
    types: [published]

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FLY_APP_NAME: cartesi-mcp-frontend
  IMAGE_NAME: ghcr.io/mugen-builders/mcp-admin-frontend

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    environment:
      name: production

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract release and image version
        id: version
        run: |
          RELEASE_VERSION="${{ github.event.release.tag_name }}"
          IMAGE_VERSION="${RELEASE_VERSION#v}"

          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_version=${IMAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync production secrets to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          VITE_ADMIN_API_BASE_URL: ${{ secrets.ADMIN_API_BASE_URL }}
          APP_ENV: production
        run: |
          flyctl secrets set \
            --app "$FLY_APP_NAME" \
            --stage \
            VITE_ADMIN_API_BASE_URL="$VITE_ADMIN_API_BASE_URL" \
            APP_ENV="$APP_ENV"

      - name: Deploy release image to existing Fly.io app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config fly.toml \
            --app "$FLY_APP_NAME" \
            --image "$IMAGE_NAME:${{ steps.version.outputs.image_version }}" \
            --strategy rolling \
            --wait-timeout 300 \
            --yes
